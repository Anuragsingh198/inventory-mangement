<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f7f9"/>
      <stop offset="100%" stop-color="#e8eef3"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="920" height="320" fill="url(#bg)" rx="12"/>
  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#234e7d">System Architecture</text>

  <g filter="url(#shadow)">
    <rect x="40" y="70" width="150" height="90" rx="10" fill="#fff" stroke="#cbd5e1"/>
    <text x="115" y="102" text-anchor="middle" font-size="14" font-weight="700" fill="#234e7d">Browser</text>
    <text x="115" y="122" text-anchor="middle" font-size="11" fill="#64748b">Chrome / Firefox</text>
    <text x="115" y="140" text-anchor="middle" font-size="11" fill="#64748b">:5173</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="250" y="55" width="180" height="120" rx="10" fill="#fff" stroke="#00aaff"/>
    <text x="340" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#234e7d">React SPA</text>
    <text x="340" y="108" text-anchor="middle" font-size="11" fill="#64748b">Vite + TypeScript</text>
    <text x="340" y="126" text-anchor="middle" font-size="11" fill="#64748b">React Query · Axios</text>
    <text x="340" y="144" text-anchor="middle" font-size="11" fill="#64748b">JWT in memory</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="490" y="55" width="180" height="120" rx="10" fill="#fff" stroke="#234e7d"/>
    <text x="580" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#234e7d">FastAPI</text>
    <text x="580" y="108" text-anchor="middle" font-size="11" fill="#64748b">REST API :8000</text>
    <text x="580" y="126" text-anchor="middle" font-size="11" fill="#64748b">JWT · RBAC</text>
    <text x="580" y="144" text-anchor="middle" font-size="11" fill="#64748b">Routers · Services</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="730" y="70" width="150" height="90" rx="10" fill="#fff" stroke="#5bc0de"/>
    <text x="805" y="102" text-anchor="middle" font-size="14" font-weight="700" fill="#234e7d">PostgreSQL</text>
    <text x="805" y="122" text-anchor="middle" font-size="11" fill="#64748b">inventory_db</text>
    <text x="805" y="140" text-anchor="middle" font-size="11" fill="#64748b">SQLAlchemy ORM</text>
  </g>

  <path d="M190 115 H250" stroke="#00aaff" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M430 115 H490" stroke="#00aaff" stroke-width="2"/>
  <path d="M670 115 H730" stroke="#5bc0de" stroke-width="2"/>
  <text x="220" y="105" font-size="10" fill="#00aaff">HTTP/JSON</text>
  <text x="450" y="105" font-size="10" fill="#00aaff">REST + JWT</text>
  <text x="700" y="105" font-size="10" fill="#5bc0de">SQL</text>

  <rect x="120" y="220" width="680" height="70" rx="8" fill="#234e7d" opacity="0.08"/>
  <text x="460" y="248" text-anchor="middle" font-size="12" font-weight="600" fill="#234e7d">Request lifecycle</text>
  <text x="460" y="268" text-anchor="middle" font-size="11" fill="#475569">User action ’ React component ’ API hook ’ FastAPI router ’ Service ’ Database ’ JSON response ’ UI update</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00aaff"/>
    </marker>
  </defs>
</svg>
