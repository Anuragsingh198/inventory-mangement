<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="880" height="300" fill="#f4f7f9" rx="12"/>
  <text x="440" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#234e7d">Order Lifecycle</text>

  <g>
    <rect x="40" y="80" width="130" height="56" rx="10" fill="#fff" stroke="#00aaff" stroke-width="2"/>
    <text x="105" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#234e7d">Create</text>
    <text x="105" y="122" text-anchor="middle" font-size="10" fill="#64748b">POST /orders</text>
  </g>
  <path d="M170 108 H210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <g>
    <rect x="210" y="80" width="130" height="56" rx="10" fill="#fef3c7" stroke="#f0ad4e" stroke-width="2"/>
    <text x="275" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Pending</text>
    <text x="275" y="122" text-anchor="middle" font-size="10" fill="#64748b">Awaiting receipt</text>
  </g>
  <path d="M340 108 H380" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <g>
    <rect x="380" y="80" width="150" height="56" rx="10" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
    <text x="455" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">Received</text>
    <text x="455" y="122" text-anchor="middle" font-size="10" fill="#64748b">Payment · Shipment</text>
  </g>

  <path d="M275 136 V175 H455 V136" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrRed)"/>
  <g>
    <rect x="195" y="175" width="160" height="56" rx="10" fill="#fee2e2" stroke="#ef4444" stroke-width="2"/>
    <text x="275" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#b91c1c">Cancelled</text>
    <text x="275" y="217" text-anchor="middle" font-size="10" fill="#64748b">PATCH status</text>
  </g>

  <rect x="580" y="70" width="260" height="170" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="710" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#234e7d">UI touchpoints</text>
  <text x="600" y="125" font-size="11" fill="#334155">" Orders page  create &amp; list</text>
  <text x="600" y="148" font-size="11" fill="#334155">" Order detail  notes, export, status</text>
  <text x="600" y="171" font-size="11" fill="#334155">" Payments  order-derived view</text>
  <text x="600" y="194" font-size="11" fill="#334155">" Shipments  mark pending ’ received</text>
  <text x="600" y="217" font-size="11" fill="#334155">" Reports  date-filtered export</text>

  <text x="440" y="268" text-anchor="middle" font-size="11" fill="#64748b">Admin marks order received from Order Detail or creates shipment from Shipments page</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
