    <text x="525" y="115" text-anchor="middle" font-size="10" fill="#64748b">alert_service</text>
  </g>
  <path d="M600 100 H650" stroke="#f0ad4e" stroke-width="2" marker-end="url(#arA)"/>

  <g>
    <rect x="650" y="70" width="170" height="60" rx="10" fill="#fef3c7" stroke="#f0ad4e"/>
