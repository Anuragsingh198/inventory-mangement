  <text x="690" y="247" text-anchor="middle" font-size="11" fill="#b45309">Re-evaluate alerts + dashboard</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#00aaff"/>
    </marker>
    <marker id="arA" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
