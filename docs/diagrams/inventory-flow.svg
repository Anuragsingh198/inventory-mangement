<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="880" height="340" fill="#f4f7f9" rx="12"/>
  <text x="440" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#234e7d">Inventory &amp; Alert Flow</text>

  <g>
    <rect x="50" y="70" width="150" height="60" rx="10" fill="#fff" stroke="#00aaff"/>
