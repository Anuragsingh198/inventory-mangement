    <text x="125" y="115" text-anchor="middle" font-size="10" fill="#64748b">Listings CRUD</text>
  </g>
  <path d="M200 100 H250" stroke="#00aaff" stroke-width="2" marker-end="url(#ar)"/>

  <g>
    <rect x="250" y="70" width="150" height="60" rx="10" fill="#fff" stroke="#234e7d"/>
    <text x="325" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#234e7d">Inventory</text>
    <text x="325" y="115" text-anchor="middle" font-size="10" fill="#64748b">qty Ě threshold</text>
  </g>
  <path d="M400 100 H450" stroke="#234e7d" stroke-width="2" marker-end="url(#ar)"/>

  <g>
    <rect x="450" y="70" width="150" height="60" rx="10" fill="#fff" stroke="#5bc0de"/>
