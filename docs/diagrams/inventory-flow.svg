    <text x="735" y="115" text-anchor="middle" font-size="10" fill="#64748b">low / out of stock</text>
  </g>

  <rect x="50" y="170" width="770" height="140" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="435" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#234e7d">Stock adjustment path</text>

  <rect x="80" y="220" width="110" height="44" rx="8" fill="#234e7d" opacity="0.1"/>
  <text x="135" y="247" text-anchor="middle" font-size="11" fill="#234e7d">Admin adjusts</text>

  <text x="220" y="247" font-size="16" fill="#94a3b8">ĺ</text>

  <rect x="240" y="220" width="150" height="44" rx="8" fill="#e0f2fe" stroke="#00aaff"/>
  <text x="315" y="247" text-anchor="middle" font-size="11" fill="#0369a1">POST /inventory/id/adjust</text>

  <text x="410" y="247" font-size="16" fill="#94a3b8">ĺ</text>

  <rect x="430" y="220" width="120" height="44" rx="8" fill="#f1f5f9"/>
  <text x="490" y="247" text-anchor="middle" font-size="11" fill="#334155">Update quantity</text>

  <text x="570" y="247" font-size="16" fill="#94a3b8">ĺ</text>

