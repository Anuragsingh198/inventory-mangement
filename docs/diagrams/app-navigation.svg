  <text x="40" y="108" font-size="11" fill="#b3d4f0">Dashboard</text>
  <text x="55" y="124" font-size="10" fill="#5bc0de">  Overview À Reports À AI</text>
  <text x="40" y="148" font-size="11" fill="#e2e8f0">Listings</text>
  <text x="40" y="168" font-size="11" fill="#b3d4f0">Inventory</text>
