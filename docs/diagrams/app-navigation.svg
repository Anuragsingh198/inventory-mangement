  <text x="55" y="224" font-size="10" fill="#5bc0de">  Suppliers À POs À Orders</text>
  <text x="40" y="248" font-size="11" fill="#b3d4f0">Sales</text>
  <text x="55" y="264" font-size="10" fill="#5bc0de">  SOs À Payments À Shipments</text>
  <text x="40" y="288" font-size="11" fill="#e2e8f0">Sales Channels</text>
