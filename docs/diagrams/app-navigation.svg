  <text x="55" y="324" font-size="10" fill="#5bc0de">  Alerts À Activity Logs</text>

  <rect x="220" y="55" width="716" height="52" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="240" y="86" font-size="12" fill="#334155">Header ù Demo badge À Notifications À Profile À Role badge</text>

  <rect x="220" y="125" width="340" height="130" rx="8" fill="#fff" stroke="#00aaff"/>
  <text x="390" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#234e7d">List &amp; detail pages</text>
  <text x="240" y="178" font-size="10" fill="#64748b">/listings/:id À /purchases/:id À /sales/:id</text>
  <text x="240" y="196" font-size="10" fill="#64748b">/suppliers/:id À /warehouses/:id À /orders/:id</text>
