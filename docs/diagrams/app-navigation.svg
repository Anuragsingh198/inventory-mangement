  <text x="600" y="196" font-size="10" fill="#64748b">Batches À Serials À Forecast À AI assistant</text>
  <text x="600" y="214" font-size="10" fill="#64748b">Import/export CSV À Email alerts (Resend)</text>

  <rect x="220" y="275" width="716" height="120" rx="8" fill="#fff" stroke="#e2e8f0"/>
