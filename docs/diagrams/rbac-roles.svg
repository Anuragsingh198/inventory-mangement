<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <rect width="900" height="340" fill="#f4f7f9" rx="12"/>
  <text x="450" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#234e7d">Role-Based Access Control (RBAC)</text>

  <rect x="40" y="60" width="150" height="70" rx="8" fill="#234e7d"/>
  <text x="115" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">super_admin</text>
  <text x="115" y="112" text-anchor="middle" font-size="10" fill="#b3d4f0">Full access (*)</text>

  <rect x="210" y="60" width="150" height="70" rx="8" fill="#fff" stroke="#00aaff"/>
  <text x="285" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#234e7d">inventory_manager</text>
  <text x="285" y="112" text-anchor="middle" font-size="10" fill="#64748b">Products · POs · Audits</text>

  <rect x="380" y="60" width="150" height="70" rx="8" fill="#fff" stroke="#5bc0de"/>
  <text x="455" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#234e7d">warehouse_staff</text>
  <text x="455" y="112" text-anchor="middle" font-size="10" fill="#64748b">Stock · Transfers</text>

  <rect x="550" y="60" width="150" height="70" rx="8" fill="#fff" stroke="#5bc0de"/>
  <text x="625" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#234e7d">sales_executive</text>
  <text x="625" y="112" text-anchor="middle" font-size="10" fill="#64748b">Customers · Sales</text>

  <rect x="720" y="60" width="140" height="70" rx="8" fill="#fff" stroke="#94a3b8"/>
  <text x="790" y="92" text-anchor="middle" font-size="12" font-weight="700" fill="#234e7d">viewer</text>
  <text x="790" y="112" text-anchor="middle" font-size="10" fill="#64748b">Read-only</text>

  <rect x="40" y="160" width="820" height="150" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="450" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#234e7d">Permission model</text>
  <text x="60" y="218" font-size="11" fill="#334155">" JWT issued on login  role embedded in token payload</text>
  <text x="60" y="240" font-size="11" fill="#334155">" FastAPI dependency: require_permission("inventory.adjust")</text>
  <text x="60" y="262" font-size="11" fill="#334155">" Frontend gates UI with canWrite()  API enforces on every write</text>
  <text x="60" y="284" font-size="11" fill="#334155">" Activity logs + login history tracked per user</text>
</svg>
