server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers for public internet exposure
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Long cache for Vite fingerprinted assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy all FastAPI routes to the backend container on the Docker network
    location ~ ^/(auth|products|categories|inventory|orders|reports|alerts|notifications|warehouses|suppliers|purchases|sales|sales-channels|batches|audits|ai|import-export|health|docs|openapi\.json|redoc)(/|$) {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # React Router: serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
